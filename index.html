<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Community Events Notice Board</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
position:sticky;
top:0;
box-shadow:0 4px 10px rgba(0,0,0,0.6);
}

#datetime{
font-size:14px;
color:#38bdf8;
margin-top:5px;
}

.container{
display:flex;
gap:20px;
padding:20px;
}

/* NOTICE BOARD */

.notice-card{
flex:3;
background:#1e293b;
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
overflow:hidden;
}

.notice-title{
font-size:22px;
margin-bottom:10px;
color:#38bdf8;
}

.table-container{
height:320px;
overflow:hidden;
position:relative;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

th{
color:#38bdf8;
}

tr:hover{
background:#334155;
}

/* SCROLLING TABLE */

.scroll{
position:absolute;
width:100%;
animation:scrollUp 25s linear infinite;
}

@keyframes scrollUp{
0%{transform:translateY(0);}
100%{transform:translateY(-50%);}
}

/* SIDEBAR */

.sidebar{
flex:1;
}

.ad-slider{
background:#1e293b;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.6);
height:320px;
position:relative;
}

.ad-slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transform:translateY(30px);
transition:all 1s ease;
}

.ad-slide.active{
opacity:1;
transform:translateY(0);
}

.ad-slide img{
width:100%;
height:100%;
object-fit:cover;
}

footer{
text-align:center;
padding:10px;
background:#020617;
font-size:12px;
margin-top:10px;
}

</style>
</head>

<body>

<header>
Community Events Notice Board
<div id="datetime"></div>
</header>

<div class="container">

<div class="notice-card">

<div class="notice-title">Upcoming Events</div>

<div class="table-container">

<div class="scroll">

<table id="notice-table">

<thead>
<tr>
<th>Date</th>
<th>Event</th>
<th>Time</th>
<th>Details</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<div class="sidebar">

<div class="ad-slider" id="adSlider">

<div class="ad-slide active">
<img src="https://source.unsplash.com/400x400/?community">
</div>

<div class="ad-slide">
<img src="https://source.unsplash.com/400x400/?festival">
</div>

<div class="ad-slide">
<img src="https://source.unsplash.com/400x400/?temple">
</div>

<div class="ad-slide">
<img src="https://source.unsplash.com/400x400/?celebration">
</div>

</div>

</div>

</div>

<footer>
Community Information Center
</footer>

<script>

/* CSV FILE URL */

const csvURL = "events.csv";

/* FETCH CSV */

fetch(csvURL)
.then(response => response.text())
.then(data => {

const rows = data.trim().split("\n").slice(1);
const tableBody = document.querySelector("#notice-table tbody");

rows.forEach(row => {

const cols = row.split(",");
const tr = document.createElement("tr");

cols.forEach(col => {

const td = document.createElement("td");
td.textContent = col.trim();
tr.appendChild(td);

});

tableBody.appendChild(tr);

});

});

/* CLOCK */

function updateClock(){

let now = new Date();

document.getElementById("datetime").innerHTML =
now.toLocaleDateString() + " | " + now.toLocaleTimeString();

}

setInterval(updateClock,1000);

/* AD SLIDER */

let slides = document.querySelectorAll(".ad-slide");
let index = 0;

function showSlide(){

slides.forEach(slide => slide.classList.remove("active"));

index++;

if(index >= slides.length){
index = 0;
}

slides[index].classList.add("active");

}

setInterval(showSlide,4000);

</script>

</body>
</html>
