<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>சமூக நிகழ்வுகள் அறிவிப்புப் பலகை</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        transition: background 0.3s, color 0.3s;
    }

    body.dark {
        background: #1e1e1e;
        color: #e0e0e0;
    }

    .banner {
        width: 100%;
        background: #004aad;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 10;
    }

    body.dark .banner {
        background: #222;
    }

    .toggle-btn {
        position: fixed;
        top: 15px;
        right: 15px;
        background: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    body.dark .toggle-btn {
        background: #333;
        color: white;
    }

    .container {
        margin-top: 80px;
        display: flex;
        gap: 15px;
        padding: 10px;
    }

    @media (max-width: 768px) {
        .container {
            flex-direction: column;
        }
    }

    .notice-board {
        flex: 3;
        background: white;
        padding: 15px;
        border-radius: 8px;
        height: 600px;
        overflow: hidden;
    }

    body.dark .notice-board {
        background: #2b2b2b;
    }

    .notice-title {
        font-size: 20px;
        margin-bottom: 10px;
        font-weight: bold;
        color: #004aad;
    }

    body.dark .notice-title {
        color: #66aaff;
    }

    .scroll-box {
        height: 700px;
        overflow: hidden;
    }

    .event {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        background: #fafafa;
        margin-bottom: 5px;
    }

    body.dark .event {
        background: #3a3a3a;
        border-color: #555;
    }

    .sidebar {
        flex: 1;
    }

    .ad-box, .video-box {
        background: white;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        text-align: center;
    }

    body.dark .ad-box, body.dark .video-box {
        background: #2b2b2b;
    }

    .ad-box img {
        width: 100%;
        border-radius: 6px;
    }

    .video-box iframe {
        width: 100%;
        height: 200px;
        border-radius: 6px;
    }

    .login-panel, .admin-panel {
        background: white;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
    }

    body.dark .login-panel, body.dark .admin-panel {
        background: #2b2b2b;
    }

    input, button {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        background: #004aad;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        opacity: 0.9;
    }
    /* PREMIUM GRADIENT BANNER */
    .banner {
        width: 100%;
        background: linear-gradient(90deg, #003b8e, #005fcc, #007bff);
        color: white;
        padding: 10px 15px;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 15px;
        box-shadow: 0 0 20px rgba(0, 123, 255, 0.6);
        animation: glowPulse 3s infinite alternate;
    }

/* Animated Glow */
    @keyframes glowPulse {
        from { box-shadow: 0 0 10px rgba(0, 123, 255, 0.4); }
        to   { box-shadow: 0 0 25px rgba(0, 123, 255, 0.9); }
    }

    .banner-logo {
        height: 55px;
        width: 55px;
        border-radius: 8px;
        object-fit: cover;
        border: 2px solid white;
    }

    .banner-text {
        display: flex;
        flex-direction: column;
        width: 100%;
    }

    .banner-title {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .banner-marquee {
        font-size: 14px;
        margin-top: 3px;
        color: #e8f3ff;
    }

    /* Dark Mode Banner */
    body.dark .banner {
        background: linear-gradient(90deg, #111, #222, #333);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    body.dark .banner-marquee {
        color: #cccccc;
    }
</style>
</head>
<body>

<div class="banner">முதியோர் சமூக நிகழ்வுகள் & அறிவிப்புகள் 
    <img src="banner.png" width="1800" height="300"> 
</div> 


<button class="toggle-btn" onclick="toggleDarkMode()">🌙 / ☀️</button>

<div class="container">

    <div class="notice-board">
        <div class="notice-title">📢 அறிவிப்புப் பலகை</div>
        <div class="scroll-box" id="scrollBox"></div>
    </div>

    <div class="sidebar">

        <div class="ad-box">
            <img src="r1.jpeg">
        </div>

        <div class="ad-box">
            <img src="r2.jpeg">
        </div>

        <!-- ⭐ NEW YOUTUBE VIDEO PANEL -->
        <div class="video-box">
            <h3>🎥 வீடியோ</h3>
            <!-- <iframe 
                src="https://www.youtube.com/watch?v=FfUj98AmxPk"
                frameborder="0"
                allowfullscreen>
            </iframe>
             -->
            <a href="https://www.youtube.com/watch?v=FfUj98AmxPk"> Play Video </a>
        </div>

        <div class="login-panel" id="loginPanel">
            <h3>🔐 நிர்வாகி உள்நுழைவு</h3>
            <input type="text" id="username" placeholder="பயனர் பெயர்">
            <input type="password" id="password" placeholder="கடவுச்சொல்">
            <button onclick="login()">உள்நுழை</button>
        </div>

        <div class="admin-panel" id="adminPanel" style="display:none;">
            <h3>🛠️ CSV பதிவேற்றம்</h3>
            <input type="file" id="csvUpload" accept=".csv">
            <button onclick="uploadCSV()">பதிவேற்று</button>
            <button onclick="logout()" style="background:#b30000;margin-top:10px;">வெளியேறு</button>
        </div>

    </div>
</div>

<script>
// DARK MODE
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

// LOAD CSV
async function loadCSV() {
    try {
        const response = await fetch("events.csv?cache=" + Math.random());
        const data = await response.text();

        const rows = data.split("\n").slice(1);
        const scrollBox = document.getElementById("scrollBox");
        scrollBox.innerHTML = "";

        rows.forEach(row => {
            const cols = row.split(",");
            if (cols.length < 6) return;

            const [date, time, event, place, mobile, email] = cols;

            const div = document.createElement("div");
            div.className = "event";
            div.innerHTML = `
                <strong>${event}</strong><br>
                📅 ${date} | ⏰ ${time}<br>
                📍 ${place}<br>
                📞 ${mobile} | ✉️ ${email}
            `;
            scrollBox.appendChild(div);
        });

    } catch (e) {
        console.log("CSV load error:", e);
    }
}

// AUTO REFRESH EVERY 30 SECONDS
setInterval(loadCSV, 30000);

// AUTO SCROLL
function startScrolling() {
    const box = document.getElementById("scrollBox");
    let scrollPos = 0;

    setInterval(() => {
        scrollPos += 1;
        box.scrollTop = scrollPos;

        if (scrollPos >= box.scrollHeight - box.clientHeight) {
            scrollPos = 0;
        }
    }, 50);
}

// LOGIN (admin/admin)
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "admin" && pass === "admin") {
        document.getElementById("loginPanel").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
    } else {
        alert("தவறான பயனர் பெயர் அல்லது கடவுச்சொல்");
    }
}

function logout() {
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("loginPanel").style.display = "block";
}

// ADMIN CSV UPLOAD
function uploadCSV() {
    const fileInput = document.getElementById("csvUpload");
    const file = fileInput.files[0];

    if (!file) {
        alert("CSV கோப்பை தேர்வு செய்யவும்");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        alert("CSV ஏற்றப்பட்டது (Demo mode).");
        loadCSV();
    };

    reader.readAsText(file);
}

loadCSV();
startScrolling();
</script>

</body>
</html>
